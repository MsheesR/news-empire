name: Auto-Generate News

on:
  schedule:
    # Runs every 4 hours automatically
    - cron: '0 */4 * * *'
  workflow_dispatch: # Allows you to trigger it manually anytime

permissions:
  contents: write # Needed to save the new articles back to your repository

jobs:
  generate-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm install
        
      - name: Run News Pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: node pipeline.js
        
      - name: Save and Publish New Articles
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git commit -m "Auto-generated latest news 🤖" || echo "No new news generated right now"
          git push
