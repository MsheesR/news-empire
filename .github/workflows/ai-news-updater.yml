name: AI News Updater & Site Rebuilder

on:
  schedule:
    - cron: '0 */2 * * *' # Run every 2 hours continuously
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run Pipeline (Fetch RSS & Generate GEO AI Articles)
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node pipeline.js

      - name: Commit and Push changes to GitHub Pages
        run: |
          git config --global user.name "LOPINUZE AI News Bot"
          git config --global user.email "bot@lopinuze.online"
          git add raw_articles/ docs/
          git commit -m "Auto-Update: Fetched market news, generated GEO AI articles, rebuilt docs" || exit 0
          git push
